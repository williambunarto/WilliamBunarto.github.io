server {
    listen 80 default_server;
    server_name williambunarto.duckdns.org _;

    location /health/ {
        alias /home/ubuntu/healthos/;
        index index.html;
        try_files $uri $uri/ /health/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /wbagent/ {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'src="/'  'src="/wbagent/';
        sub_filter "src='/"  "src='/wbagent/";
        sub_filter 'href="/' 'href="/wbagent/';
        sub_filter "href='/" "href='/wbagent/";
    }

    location = / { return 302 /health/; }

    location /wealth/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # WB Trade
    location = /trade {
        return 301 /trade/;
    }
    location /trade/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }
    location /trade/static {
        alias /home/ubuntu/wbtrade/static;
        expires 1h;
    }
    location /trade/uploads {
        alias /home/ubuntu/wbtrade/uploads;
        expires 7d;
    }
}
