<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LogiWave Engineering Consultancy · Jakarta, Indonesia</title>
<meta name="description" content="LogiWave builds the apps and systems your business depends on. Enterprise platforms, AI automation, mobile apps, and cloud infrastructure. Architecture-first, fully documented.">
<meta property="og:title" content="LogiWave Engineering Consultancy">
<meta property="og:description" content="We build the apps and systems your business depends on. Architecture-first, fully documented, built to last.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.logiwave.id">
<meta name="theme-color" content="#07D6EC">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--c0:#070D1A;--c1:#0B1422;--c2:#101C30;--c3:#16243C;--cy:#07D6EC;--cy2:#05A8BC;--bl:#4B82F6;--t1:#EFF4FB;--t2:#8FA8C8;--t3:#4A6480;--f:'Plus Jakarta Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--c0);color:var(--t1);font-family:var(--f);-webkit-font-smoothing:antialiased;line-height:1.6}
a{text-decoration:none;color:inherit}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(7,214,236,.0)}50%{box-shadow:0 0 28px 4px rgba(7,214,236,.12)}}
@keyframes sweepLine{0%,100%{opacity:.2}50%{opacity:.7}}
@keyframes wordSlide{0%{opacity:0;transform:translateY(8px)}15%,80%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-8px)}}
@keyframes nodePulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes lineFlow{0%{stroke-dashoffset:14}100%{stroke-dashoffset:0}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes bpStep{from{transform:scaleX(0)}to{transform:scaleX(1)}}

.fu1{animation:fadeUp .75s .08s ease both}
.fu2{animation:fadeUp .75s .24s ease both}
.fu3{animation:fadeUp .75s .42s ease both}
.pi{animation:fadeIn .25s ease both}
.rv{opacity:0;transform:translateY(28px);transition:opacity .65s cubic-bezier(.22,1,.36,1),transform .65s cubic-bezier(.22,1,.36,1)}
.rv.vis{opacity:1;transform:translateY(0)}
.rv.d1{transition-delay:.05s}.rv.d2{transition-delay:.12s}.rv.d3{transition-delay:.2s}
.rv.d4{transition-delay:.28s}.rv.d5{transition-delay:.37s}.rv.d6{transition-delay:.46s}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:50;transition:background .3s,border-color .3s;background:rgba(7,13,26,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05)}
.ni{max-width:1280px;margin:0 auto;padding:0 36px;height:68px;display:flex;align-items:center;justify-content:space-between}
.logo{cursor:pointer;display:flex;align-items:center;gap:11px;transition:opacity .2s}.logo:hover{opacity:.8}
.li{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#07D6EC,#4B82F6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#050D18;flex-shrink:0;transition:transform .25s;animation:glowPulse 5s ease-in-out infinite}
.logo:hover .li{transform:rotate(-8deg) scale(1.1)}
.lt{font-weight:800;font-size:19px;letter-spacing:-.02em}.lt span{color:var(--cy)}
.nlinks{display:flex;align-items:center;gap:32px}
.nlink{font-size:14px;font-weight:500;cursor:pointer;padding-bottom:2px;color:var(--t2);border-bottom:1.5px solid transparent;transition:all .2s;white-space:nowrap}
.nlink:hover{color:var(--t1)}.nlink.active{color:var(--t1);border-color:var(--cy)}
.nacts{display:flex;align-items:center;gap:12px}
.lbtn{padding:7px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--t3);font-family:var(--f);font-size:13px;cursor:pointer;transition:all .2s}
.lbtn:hover{border-color:rgba(7,214,236,.3);color:var(--t2)}

/* Buttons */
.bp{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--cy);color:#050D18;font-family:var(--f);font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all .22s;white-space:nowrap;position:relative;overflow:hidden}
.bp::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.18);transform:translateX(-100%);transition:transform .32s ease}
.bp:hover::after{transform:translateX(100%)}
.bp:hover{background:var(--cy2);transform:translateY(-1px);box-shadow:0 8px 28px rgba(7,214,236,.32)}
.bp.sm{padding:9px 20px;font-size:13px}.bp:disabled{opacity:.6;cursor:default;transform:none}
.bsec{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;background:transparent;color:var(--t1);font-family:var(--f);font-size:14px;font-weight:500;border:1px solid rgba(255,255,255,.18);border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap}
.bsec:hover{border-color:rgba(7,214,236,.4);color:var(--cy);transform:translateY(-1px)}
.walink{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:#25D366;color:#fff;font-family:var(--f);font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .2s;text-decoration:none}
.walink:hover{background:#1ebe5a;transform:translateY(-1px)}

/* Cards */
.card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:14px;transition:all .3s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -30%,rgba(7,214,236,.06),transparent 65%);opacity:0;transition:opacity .35s}
.card:hover{background:rgba(255,255,255,.04);border-color:rgba(7,214,236,.25);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.card:hover::before{opacity:1}

/* Layout */
.wrap{max-width:1280px;margin:0 auto;padding:0 36px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cy);display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';display:inline-block;width:22px;height:1.5px;background:var(--cy);border-radius:1px}
.eyebrow.c{justify-content:center}
.sec{padding:96px 36px}.sec-alt{padding:96px 36px;background:var(--c1);border-top:1px solid rgba(255,255,255,.04)}
.ph{padding:84px 36px;background:var(--c1);border-bottom:1px solid rgba(255,255,255,.05)}
.gtext{background:linear-gradient(120deg,var(--cy) 0%,#7AABFF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;padding-top:68px;position:relative;overflow:hidden;background:var(--c0)}
#particle-canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
.hero-glow-a{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(7,214,236,.065),transparent 70%);top:-150px;left:-100px;pointer-events:none;z-index:0;animation:float 8s ease-in-out infinite}
.hero-glow-b{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(75,130,246,.055),transparent 70%);bottom:-100px;right:100px;pointer-events:none;z-index:0;animation:float 10s 2s ease-in-out infinite}
.hg{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;padding:88px 0 72px;position:relative;z-index:1}
.hsvg-wrap{position:relative}
.hsvg{width:100%;filter:drop-shadow(0 0 24px rgba(7,214,236,.1))}
.hchips{display:flex;gap:8px;flex-wrap:wrap;margin-top:28px}
.hchip{padding:5px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.12);font-size:12px;font-weight:600;color:var(--t3);background:rgba(255,255,255,.03);transition:all .2s}
.hchip:hover{border-color:rgba(7,214,236,.3);color:var(--t2)}
.hchip.cy{border-color:rgba(7,214,236,.25);color:var(--cy);background:rgba(7,214,236,.05)}
.rot-wrap{display:inline-flex;align-items:center;gap:0;overflow:hidden;vertical-align:bottom;height:1.4em}
.rot-word{display:block;color:var(--cy);font-weight:700;transition:all .35s cubic-bezier(.22,1,.36,1);white-space:nowrap}

/* Stats */
.statbar{background:var(--c1);border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden}
.statbar::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(7,214,236,.02),transparent);animation:sweepLine 5s ease-in-out infinite}
.sg{display:grid;grid-template-columns:repeat(4,1fr)}
.si{padding:36px 32px;border-right:1px solid rgba(255,255,255,.05);cursor:default;transition:background .2s}
.si:last-child{border-right:none}.si:hover{background:rgba(7,214,236,.02)}
.count-num{font-size:42px;font-weight:800;color:var(--cy);line-height:1;margin-bottom:6px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}

/* Marquee */
.marquee-wrap{background:var(--c0);border-bottom:1px solid rgba(255,255,255,.05);padding:13px 0;overflow:hidden}
.marquee-track{display:flex;width:max-content;animation:marquee 32s linear infinite}
.marquee-track:hover{animation-play-state:paused}
.mpill{padding:5px 18px;border-radius:100px;border:1px solid rgba(255,255,255,.07);font-size:12px;font-weight:600;color:var(--t3);white-space:nowrap;margin:0 8px;transition:all .22s;cursor:default}
.mpill:hover{border-color:rgba(7,214,236,.28);color:var(--t2)}

/* Service icons */
.svc-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s}
.card:hover .svc-icon{transform:scale(1.1)}

/* Blueprint visual */
.bp-visual{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.018)}
.bp-step{padding:22px 16px;border-right:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .25s;position:relative}
.bp-step:last-child{border-right:none}
.bp-step::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cy),var(--bl));transform:scaleX(0);transform-origin:left;transition:transform .32s cubic-bezier(.22,1,.36,1)}
.bp-step:hover::after{transform:scaleX(1)}
.bp-step:hover{background:rgba(7,214,236,.04)}
.bp-conn{position:relative;display:flex;align-items:center;justify-content:center;padding:28px 0}
.bp-line{position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(7,214,236,.25),transparent);transform:translateY(-50%)}

/* Sector cards */
.sec-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;letter-spacing:.04em;transition:all .3s}
.card:hover .sec-icon{transform:scale(1.08)}

/* Why rows */
.why-row{padding:30px 32px;border-bottom:1px solid rgba(255,255,255,.05);display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start;transition:background .22s;cursor:default}
.why-row:hover{background:rgba(7,214,236,.02)}
.why-row:last-child{border-bottom:none}

/* Portfolio */
.fp{padding:7px 18px;border-radius:100px;font-size:13px;font-weight:500;border:1px solid rgba(255,255,255,.1);color:var(--t3);background:transparent;cursor:pointer;transition:all .22s;font-family:var(--f)}
.fp:hover{border-color:rgba(7,214,236,.28);color:var(--t2)}.fp.act{background:var(--cy);border-color:var(--cy);color:#050D18;font-weight:700}
.port-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:100px;background:rgba(7,214,236,.07);border:1px solid rgba(7,214,236,.14);white-space:nowrap}

/* Testimonials */
.tcard{padding:32px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);transition:all .3s}
.tcard:hover{border-color:rgba(7,214,236,.2);transform:translateY(-2px)}
.tavatar{width:38px;height:38px;border-radius:50%;background:rgba(7,214,236,.08);border:1px solid rgba(7,214,236,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--cy);flex-shrink:0}

/* FAQ */
.faq-item{border-bottom:1px solid rgba(255,255,255,.06)}
.faq-q{width:100%;background:none;border:none;color:var(--t1);font-family:var(--f);font-size:15px;font-weight:500;text-align:left;padding:20px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;transition:color .2s}
.faq-q:hover{color:var(--cy)}
.faq-icon{font-size:20px;color:var(--cy);flex-shrink:0;display:inline-block;transition:transform .3s cubic-bezier(.22,1,.36,1)}
.faq-a{font-size:14px;color:var(--t2);line-height:1.8;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .4s ease}
.faq-a.open{max-height:320px;padding-bottom:20px}

/* Form */
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:13px 17px;color:var(--t1);font-family:var(--f);font-size:14.5px;outline:none;transition:all .25s}
.inp:focus{border-color:rgba(7,214,236,.45);background:rgba(7,214,236,.03);box-shadow:0 0 0 3px rgba(7,214,236,.07)}
.inp::placeholder{color:var(--t3)}
select.inp option{background:#101C30;color:var(--t1)}
textarea.inp{resize:vertical;min-height:130px;line-height:1.65}
.flabel{font-size:12.5px;font-weight:600;color:var(--t2);margin-bottom:7px;display:block;letter-spacing:.02em}

/* CTA banner */
.ctab{border-radius:18px;background:linear-gradient(135deg,rgba(7,214,236,.07),rgba(75,130,246,.06));border:1px solid rgba(7,214,236,.18);padding:68px 76px;display:flex;align-items:center;justify-content:space-between;gap:40px;position:relative;overflow:hidden}
.ctab::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(7,214,236,.06),transparent 70%);top:-100px;right:180px;pointer-events:none;animation:glowPulse 6s ease-in-out infinite}

/* Footer */
.flink{color:var(--t2);font-size:13.5px;cursor:pointer;transition:color .15s;display:block;line-height:2.1}.flink:hover{color:var(--t1)}
.footer{background:var(--c1);border-top:1px solid rgba(255,255,255,.05)}

/* Mobile */
.mob-overlay{position:fixed;inset:0;background:rgba(7,13,26,.98);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:44px}
.mob-link{font-size:32px;font-weight:800;cursor:pointer;color:var(--t1);transition:color .15s;letter-spacing:-.02em}
.mob-link:hover,.mob-link.active{color:var(--cy)}
.hbtn{background:none;border:none;color:var(--t1);cursor:pointer;font-size:22px;padding:4px;display:none}
.mob-acts{display:none;align-items:center;gap:10px}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--c1)}::-webkit-scrollbar-thumb{background:var(--c3);border-radius:2px}

@media(max-width:960px){
  .nlinks,.nacts{display:none!important}.hbtn{display:block}.mob-acts{display:flex!important}
  .hg{grid-template-columns:1fr;padding:56px 0 40px}.hsvg-wrap{display:none}
  .sg{grid-template-columns:1fr 1fr}
  .si:nth-child(1),.si:nth-child(2){border-bottom:1px solid rgba(255,255,255,.05)}
  .si:nth-child(2),.si:nth-child(4){border-right:none!important}
  .si:nth-child(3){border-right:1px solid rgba(255,255,255,.05)}
  .g1{grid-template-columns:1fr!important}.g2{grid-template-columns:1fr 1fr!important}
  .ctab{flex-direction:column;padding:44px 24px;text-align:center}
  .ph,.sec,.sec-alt{padding:60px 20px}
  .hbig{font-size:30px!important;line-height:1.18!important}
  .phh{font-size:28px!important}.sech{font-size:24px!important}.abh{font-size:26px!important}
  .wrap{padding:0 20px}
  .footer-g{grid-template-columns:1fr!important}
  .faq-grid{grid-template-columns:1fr!important}
  .bp-visual{grid-template-columns:1fr 1fr}
  .bp-step{border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ══ SVG ICONS ══ */
const ICONS={
  platform:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
  ai:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="3" r="1"/><circle cx="12" cy="21" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="21" cy="12" r="1"/><line x1="12" y1="6" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="18"/><line x1="6" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="18" y2="12"/></svg>`,
  connect:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`,
  cloud:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>`,
  mobile:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`,
  design:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 011.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>`,
};

/* ══ DATA ══ */
const SVCS=[
  {a:'var(--cy)',n:'01',icon:'platform',en:{title:'Business Platforms and Operations Software',sub:'The systems your team works in every day.',desc:'We build the operational core of your business. Inventory management, HR systems, approval workflows, document handling, sales tracking. Whatever your team is currently doing in spreadsheets or sticky notes, we build a proper system for it.',tag:'Enterprise · Web'},id:{title:'Platform Bisnis dan Software Operasional',sub:'Sistem yang digunakan tim Anda setiap hari.',desc:'Kami membangun inti operasional bisnis Anda. Manajemen inventaris, sistem HR, alur kerja persetujuan, penanganan dokumen, pelacakan penjualan. Apapun yang tim Anda lakukan di spreadsheet, kami bangun sistem yang proper.',tag:'Enterprise · Web'}},

  `<div style="display:flex;flex-direction:column;gap:16px;"><div class="g1" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div><label class="flabel">${T.fn} *</label><input id="fname" class="inp" placeholder="${S.lang==='en'?'Your name':'Nama Anda'}" value="${S.form.name}"></div><div><label class="flabel">${T.fe} *</label><input id="femail" class="inp" type="email" placeholder="${S.lang==='en'?'your@email.com':'email@anda.com'}" value="${S.form.email}"></div></div><div class="g1" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div><label class="flabel">${T.fc}</label><input id="forg" class="inp" placeholder="${S.lang==='en'?'Organisation name':'Nama organisasi'}" value="${S.form.org}"></div><div><label class="flabel">${T.fr}</label><input id="frole" class="inp" placeholder="${S.lang==='en'?'Your role':'Jabatan Anda'}" value="${S.form.role}"></div></div><div><label class="flabel">${T.ft}</label><select id="ftype" class="inp">${T.fto.map((o,i)=>`<option value="${i===0?'':o}"${S.form.type===o?' selected':''}>${o}</option>`).join('')}</select></div><div><label class="flabel">${T.fm} *</label><textarea id="fmsg" class="inp" placeholder="${T.fmp}">${S.form.msg}</textarea></div><div style="display:flex;align-items:center;gap:16px;"><button class="bp" id="fsub" style="padding:14px 32px;">${T.fsb}</button><span style="font-size:12px;color:var(--t3);">* ${S.lang==='en'?'Required':'Wajib diisi'}</span></div></div>`;
  return`<div class="pi" style="padding-top:68px;"><div class="ph"><div class="wrap">${ey(T.coe)}<h1 class="phh" style="font-size:42px;font-weight:800;letter-spacing:-.03em;line-height:1.1;white-space:pre-line;margin:18px 0 14px;">${T.coh}</h1><p style="font-size:16px;color:var(--t2);max-width:480px;line-height:1.7;">${T.cos}</p></div></div>
<section class="sec"><div class="wrap"><div class="g1" style="display:grid;grid-template-columns:1.7fr 1fr;gap:60px;align-items:start;">${form}<div style="display:flex;flex-direction:column;gap:14px;"><div class="card" style="padding:26px;"><div style="font-size:11px;font-weight:700;color:var(--cy);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;">${T.howh}</div>${steps}</div><div class="card" style="padding:22px;"><div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;">${T.cih}</div><a href="mailto:william.bunarto.job@gmail.com" style="display:block;font-size:13.5px;color:var(--cy);font-weight:600;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);text-decoration:none;transition:opacity .2s;" onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">william.bunarto.job@gmail.com</a><div style="font-size:13px;color:var(--t2);padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);">hello@logiwave.id</div><div style="font-size:13px;color:var(--t2);padding:9px 0;">Jakarta, Indonesia</div></div><div style="padding:18px;border-radius:10px;background:rgba(7,214,236,.04);border:1px solid rgba(7,214,236,.12);"><div style="font-size:11px;font-weight:700;color:var(--cy);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;">${T.rsph}</div><p style="font-size:13px;color:var(--t2);line-height:1.7;">${T.rspp}</p></div></div></div></div></section></div>`;
}

/* ══ RENDER ENGINE ══ */
function render(){
  const app=document.getElementById('app');
  let html=renderNav();
  if(S.page==='home') html+=renderHome();
  else if(S.page==='services') html+=renderServices();
  else if(S.page==='portfolio') html+=renderPortfolio();
  else if(S.page==='about') html+=renderAbout();
  else html+=renderContact();
  html+=renderFooter();
  app.innerHTML=html;
  if(!S.mobMenu) window.scrollTo({top:0,behavior:'instant'});
  attachEvents();
  initAnimations();
}

/* ══ EVENTS ══ */
function attachEvents(){
  document.querySelectorAll('[data-page]').forEach(el=>{el.addEventListener('click',ev=>{ev.stopPropagation();navigate(el.dataset.page);});});
  document.querySelectorAll('[data-tlang]').forEach(el=>{el.addEventListener('click',()=>{S.lang=S.lang==='en'?'id':'en';render();});});
  document.querySelectorAll('[data-pcat]').forEach(el=>{el.addEventListener('click',()=>{const sy=window.scrollY;S.pfcat=el.dataset.pcat;render();window.scrollTo(0,sy);});});
  document.querySelectorAll('[data-faq]').forEach(el=>{el.addEventListener('click',()=>{const i=parseInt(el.dataset.faq),sy=window.scrollY;S.openFaq=S.openFaq===i?-1:i;render();window.scrollTo(0,sy);});});
  const mob=document.getElementById('mob-open');if(mob)mob.addEventListener('click',()=>{S.mobMenu=true;render();});
  const mc=document.getElementById('mob-close');if(mc)mc.addEventListener('click',()=>{S.mobMenu=false;render();});
  [['fname','name'],['femail','email'],['forg','org'],['frole','role'],['ftype','type'],['fmsg','msg']].forEach(([id,key])=>{
    const el=document.getElementById(id);if(!el)return;
    el.addEventListener(el.tagName==='SELECT'?'change':'input',e=>{S.form[key]=e.target.value;});
  });
  const sub=document.getElementById('fsub');
  if(sub)sub.addEventListener('click',()=>{
    if(!S.form.name.trim()||!S.form.email.trim()||!S.form.msg.trim()){
      sub.style.animation='none';sub.offsetHeight;sub.style.animation='';return;
    }
    const body=`Name: ${S.form.name}\nEmail: ${S.form.email}\nOrganisation: ${S.form.org}\nRole: ${S.form.role}\nType: ${S.form.type}\n\n${S.form.msg}`;
    const subject=`LogiWave Enquiry from ${S.form.name}${S.form.org?' ('+S.form.org+')':''}`;
    window.location.href=`mailto:william.bunarto.job@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    setTimeout(()=>{S.formSent=true;render();},600);
  });
  const nav=document.getElementById('main-nav');
  if(nav){const fn=()=>{nav.style.background=window.scrollY>60?'rgba(7,13,26,.98)':'rgba(7,13,26,.85)';};window.addEventListener('scroll',fn,{passive:true});fn();}
}

function navigate(p){S.page=p;S.mobMenu=false;S.openFaq=-1;if(p!=='contact'){S.form={name:'',email:'',org:'',role:'',type:'',msg:''};S.formSent=false;}render();}

/* ══ ANIMATIONS ══ */
function initAnimations(){
  /* Scroll reveal */
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target);}}),{threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv').forEach(el=>io.observe(el));

  /* Counters */
  const co=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting&&e.target.dataset.target){countUp(e.target);co.unobserve(e.target);}}),{threshold:.5});
  document.querySelectorAll('.count-num').forEach(el=>co.observe(el));

  /* Rotating word */
  const rw=document.getElementById('rot-word');
  if(rw){
    const words=t().hrot;let wi=0;
    setInterval(()=>{
      rw.style.opacity='0';rw.style.transform='translateY(8px)';
      setTimeout(()=>{wi=(wi+1)%words.length;rw.textContent=words[wi];rw.style.opacity='1';rw.style.transform='translateY(0)';},280);
    },2400);
  }

  /* SVG animations */
  document.querySelectorAll('.svg-node').forEach((n,i)=>{
    n.style.animation=`nodePulse ${2.5+i*.35}s ${i*.45}s ease-in-out infinite`;
    n.style.transformOrigin='center';
  });
  document.querySelectorAll('.svg-line').forEach((l,i)=>{
    l.style.strokeDasharray='4,4';
    l.style.animation=`lineFlow ${1.6+i*.18}s ${i*.12}s linear infinite`;
  });

  /* Particle canvas */
  initParticles();

  /* Blueprint hover */
  document.querySelectorAll('.bp-step').forEach(el=>{
    el.addEventListener('mouseenter',()=>el.style.background='rgba(7,214,236,.04)');
    el.addEventListener('mouseleave',()=>el.style.background='transparent');
  });
}

function countUp(el){
  const raw=el.dataset.target;
  if(isNaN(parseInt(raw))){el.style.animation='fadeUp .5s ease both';return;}
  const end=parseInt(raw);const sfx=raw.replace(/[0-9]/g,'');
  let c=0;const dur=1400;const s=Date.now();
  const step=()=>{const p=Math.min((Date.now()-s)/dur,1),ease=1-Math.pow(1-p,3);c=Math.round(ease*end);el.textContent=c+sfx;if(p<1)requestAnimationFrame(step);};
  step();
}

function initParticles(){
  const canvas=document.getElementById('particle-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let w,h,pts=[];
  const N=55,MAX_DIST=120;
  function resize(){w=canvas.width=canvas.offsetWidth;h=canvas.height=canvas.offsetHeight;}
  resize();window.addEventListener('resize',()=>{resize();});
  for(let i=0;i<N;i++) pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.5+.5});
  function draw(){
    ctx.clearRect(0,0,w,h);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1;
      if(p.y<0||p.y>h)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(7,214,236,.35)';ctx.fill();
    });
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<MAX_DIST){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(7,214,236,${.12*(1-d/MAX_DIST)})`;ctx.lineWidth=.7;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
}

/* Inject keyframes */
const ks=document.createElement('style');
ks.textContent=`@keyframes nodePulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}@keyframes lineFlow{0%{stroke-dashoffset:14}100%{stroke-dashoffset:0}}`;
document.head.appendChild(ks);

render();
</script>
