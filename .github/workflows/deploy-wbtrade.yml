name: Deploy WB Trade to Server

on:
  push:
    branches: [main]
    paths:
      - 'wbtrade/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          echo "" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Create directories
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "mkdir -p /home/ubuntu/wbtrade/{routers,static/{css,js},uploads,data}"

      - name: Copy Python source files
        run: |
          KEY=/tmp/deploy_key
          OPTS="-i $KEY -o StrictHostKeyChecking=no"
          HOST="ubuntu@williambunarto.duckdns.org"
          scp $OPTS \
            wbtrade/main.py \
            wbtrade/database.py \
            wbtrade/market_engine.py \
            wbtrade/scheduler.py \
            wbtrade/telegram_alerts.py \
            wbtrade/requirements.txt \
            $HOST:/home/ubuntu/wbtrade/
          scp $OPTS wbtrade/routers/*.py $HOST:/home/ubuntu/wbtrade/routers/

      - name: Copy static assets
        run: |
          KEY=/tmp/deploy_key
          OPTS="-i $KEY -o StrictHostKeyChecking=no"
          HOST="ubuntu@williambunarto.duckdns.org"
          scp $OPTS wbtrade/static/*.html $HOST:/home/ubuntu/wbtrade/static/
          scp $OPTS wbtrade/static/css/style.css $HOST:/home/ubuntu/wbtrade/static/css/
          scp $OPTS wbtrade/static/js/*.js $HOST:/home/ubuntu/wbtrade/static/js/

      - name: Setup venv and install dependencies
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "sudo apt-get install -y python3-venv python3-pip > /dev/null 2>&1; cd /home/ubuntu/wbtrade && ([ -d venv ] || python3 -m venv venv) && venv/bin/pip install -q --upgrade pip && venv/bin/pip install -q -r requirements.txt"

      - name: Install systemd service
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            wbtrade/wbtrade.service ubuntu@williambunarto.duckdns.org:/tmp/wbtrade.service
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "sudo mv /tmp/wbtrade.service /etc/systemd/system/wbtrade.service && sudo systemctl daemon-reload && sudo systemctl enable wbtrade"

      - name: Patch nginx config
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            wbtrade/scripts/patch_nginx.py ubuntu@williambunarto.duckdns.org:/tmp/patch_nginx.py
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "sudo python3 /tmp/patch_nginx.py"

      - name: Test nginx and reload
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "sudo nginx -t && sudo systemctl reload nginx"

      - name: Start / restart wbtrade service
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "sudo systemctl restart wbtrade && sleep 3 && sudo systemctl status wbtrade --no-pager -l"

      - name: Smoke test
        run: |
          sleep 5
          curl -sf http://williambunarto.duckdns.org/trade/ -o /dev/null && echo 'OK' || echo 'WARNING: smoke test failed'
