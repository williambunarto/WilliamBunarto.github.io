name: Deploy to DuckDNS Server

on:
  push:
    branches: [main]
    paths:
      - 'wealth/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          echo "" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to server
        run: |
          KEY=/tmp/deploy_key
          HOST=williambunarto.duckdns.org
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=10 -o BatchMode=yes"
          DEST="ubuntu@$HOST:/home/ubuntu/wealthmatrix/public/index.html"

          scp $SSH_OPTS -i $KEY wealth/index.html $DEST
          echo "Deployed to $DEST"
