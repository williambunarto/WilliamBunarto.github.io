name: Deploy to DuckDNS Server

on:
  push:
    branches: [main]
    paths:
      - 'wealth/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          echo "" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Discover server and deploy
        run: |
          USERS="root ubuntu admin user william williambunarto"
          KEY=/tmp/deploy_key
          HOST=williambunarto.duckdns.org
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=8 -o BatchMode=yes"
          
          CONNECTED_USER=""
          for U in $USERS; do
            echo "Trying user: $U"
            if ssh $SSH_OPTS -i $KEY $U@$HOST "echo ok" 2>/dev/null; then
              CONNECTED_USER=$U
              echo "Connected as: $U"
              break
            fi
          done
          
          if [ -z "$CONNECTED_USER" ]; then
            echo "ERROR: Could not connect with any username"
            exit 1
          fi
          
          # Find wealth directory
          WEALTH_PATH=$(ssh $SSH_OPTS -i $KEY $CONNECTED_USER@$HOST \
            "find /var/www /srv /home /opt /root /usr/share/nginx /usr/share/apache2 -name 'wealth' -type d 2>/dev/null | head -1")
          
          echo "Wealth path: $WEALTH_PATH"
          
          if [ -z "$WEALTH_PATH" ]; then
            echo "ERROR: Could not find wealth directory on server"
            # Print web roots to help debug
            ssh $SSH_OPTS -i $KEY $CONNECTED_USER@$HOST \
              "find /var/www /srv /home /opt -name '*.html' 2>/dev/null | head -20"
            exit 1
          fi
          
          # Deploy the file
          scp $SSH_OPTS -i $KEY wealth/index.html $CONNECTED_USER@$HOST:$WEALTH_PATH/index.html
          echo "Deployed wealth/index.html to $CONNECTED_USER@$HOST:$WEALTH_PATH/index.html"
