name: Deploy WealthMatrix v2

on:
  workflow_dispatch:
  push:
    branches:
      - claude/deploy-wealthmatrix-v2-kG7CD
    paths:
      - 'wealthmatrix/**'
      - '.github/workflows/deploy-wealthmatrix.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle.key
          chmod 600 ~/.ssh/oracle.key
          ssh-keyscan -H 140.245.103.249 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload app to server
        run: |
          ssh -i ~/.ssh/oracle.key ubuntu@140.245.103.249 "mkdir -p ~/wealthmatrix/public"
          scp -i ~/.ssh/oracle.key \
            wealthmatrix/package.json \
            wealthmatrix/server.js \
            wealthmatrix/deploy.sh \
            wealthmatrix/nginx-fix.sh \
            ubuntu@140.245.103.249:~/wealthmatrix/
          scp -i ~/.ssh/oracle.key -r \
            wealthmatrix/public \
            ubuntu@140.245.103.249:~/wealthmatrix/

      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/oracle.key ubuntu@140.245.103.249 "cd ~/wealthmatrix && bash deploy.sh"

      - name: Fix Nginx /wealth/ and /api/ locations
        run: |
          ssh -i ~/.ssh/oracle.key ubuntu@140.245.103.249 "bash ~/wealthmatrix/nginx-fix.sh"

      - name: Diagnose — server state
        run: |
          ssh -i ~/.ssh/oracle.key ubuntu@140.245.103.249 bash << 'EOF'
          echo "=== PM2 STATUS ==="
          pm2 list
          echo ""
          echo "=== APP LOG (last 30 lines) ==="
          pm2 logs wealthmatrix --lines 30 --nostream 2>/dev/null || echo "(no pm2 logs)"
          echo ""
          echo "=== NGINX FULL CONFIG ==="
          sudo nginx -T 2>&1
          echo ""
          echo "=== DIRECT APP TESTS ==="
          echo "--- GET localhost:3001/ ---"
          curl -si http://localhost:3001/ | head -10
          echo "--- GET localhost:3001/api/auth/me ---"
          curl -si http://localhost:3001/api/auth/me | head -10
          echo "--- GET localhost:3001/api/investments (expect 401) ---"
          curl -si http://localhost:3001/api/investments | head -10
          echo ""
          echo "=== NGINX PROXY TESTS ==="
          echo "--- GET /wealth/ via Nginx ---"
          curl -si http://localhost/wealth/ | head -10
          echo "--- GET /api/auth/me via Nginx ---"
          curl -si http://localhost/api/auth/me | head -10
          echo "--- GET /api/investments via Nginx (expect 401, NOT 404) ---"
          curl -si http://localhost/api/investments | head -10
          EOF

      - name: Verify public URL
        run: |
          sleep 2
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://williambunarto.duckdns.org/wealth/)
          echo "HTTP status for /wealth/: $HTTP"
          APIHTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://williambunarto.duckdns.org/api/auth/me)
          echo "HTTP status for /api/auth/me: $APIHTTP"
          if [ "$HTTP" = "200" ] && ([ "$APIHTTP" = "401" ] || [ "$APIHTTP" = "200" ]); then
            echo "✓ Routing looks correct"
          else
            echo "WARNING: unexpected statuses — check Diagnose step above"
          fi
