name: Explore Bot + Install gspread

on:
  push:
    branches: [main]
    paths: ['.github/workflows/explore-bot.yml']

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          echo "" | base64 -d > /tmp/k && chmod 600 /tmp/k

      - name: Read bot.py structure
        run: |
          ssh -i /tmp/k -o StrictHostKeyChecking=no ubuntu@140.245.103.249 bash << 'ENDSSH'
          echo "=== HEAD 120 ==="
          head -120 ~/bot.py
          echo "=== TAIL 80 ==="
          tail -80 ~/bot.py
          echo "=== CommandHandlers ==="
          grep -n 'CommandHandler\|add_handler\|application\|dispatcher\|def cmd\|async def\|^def ' ~/bot.py | head -60
          echo "=== Imports ==="
          head -30 ~/bot.py
          echo "=== PTB version ==="
          pip3 show python-telegram-bot 2>/dev/null | grep Version
          echo "=== gspread installed ==="
          pip3 show gspread 2>/dev/null || echo "NOT INSTALLED"
          echo "=== Python version ==="
          python3 --version
          ENDSSH

      - name: Install gspread
        run: |
          ssh -i /tmp/k -o StrictHostKeyChecking=no ubuntu@140.245.103.249 \
            "pip3 install gspread google-auth && echo 'gspread installed OK'"
