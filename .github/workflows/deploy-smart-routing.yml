name: Deploy Smart Model Routing
on:
  push:
    paths:
      - 'wbagent/patch_smart_routing.py'
      - '.github/workflows/deploy-smart-routing.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy smart routing to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 140.245.103.249
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Install dependencies (httpx for image gen, pillow for Gemini vision)
            pip3 install httpx pillow --break-system-packages -q 2>&1 || \
            pip3 install httpx pillow -q 2>&1 || \
            echo "pip install warning (may already be installed)"

            # Fetch latest patch script from repo
            curl -fsSL \
              "https://raw.githubusercontent.com/williambunarto/WilliamBunarto.github.io/main/wbagent/patch_smart_routing.py" \
              -o /tmp/patch_smart_routing.py

            # Apply patch (idempotent)
            python3 /tmp/patch_smart_routing.py

            # Restart bot with env loaded from .env
            pkill -f 'python3 /home/ubuntu/bot.py' || true
            sleep 2
            export $(grep -v '^#' /home/ubuntu/.env | xargs)
            nohup python3 /home/ubuntu/bot.py >> /home/ubuntu/bot.log 2>&1 &
            sleep 4
            pgrep -f 'python3 /home/ubuntu/bot.py' && echo "Bot running OK." || \
              (echo "ERROR: bot not running"; tail -30 /home/ubuntu/bot.log; exit 1)
