name: Diagnose AI Error

on:
  push:
    branches: [claude/trusting-archimedes-yb9d8l]
    paths:
      - '.github/workflows/diagnose-ai-error.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key
      - name: Deep inspect
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 << 'ENDSSH'
          echo "=== Lines 120-145 (AI error handler) ==="
          sed -n '120,145p' /home/ubuntu/bot.py
          echo
          echo "=== Lines 1130-1170 (scheduled_eod_report) ==="
          sed -n '1130,1170p' /home/ubuntu/bot.py
          echo
          echo "=== Running bot processes ==="
          ps aux | grep bot.py | grep -v grep
          echo
          echo "=== Crontab ==="
          crontab -l 2>/dev/null || echo 'no crontab'
          ENDSSH
