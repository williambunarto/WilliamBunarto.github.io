name: Diagnose AI Error

on:
  push:
    branches: [claude/trusting-archimedes-yb9d8l]
    paths:
      - '.github/workflows/diagnose-ai-error.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key
      - name: Inspect bot.py for AI error
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 << 'ENDSSH'
          echo "=== grep: AI error / scan / report functions ==="
          grep -n 'AI error\|ai_analysis\|ai_insight\|Connection error\|_auto_scan\|end_of_day\|daily_report\|eod\|scan_job\|def.*report\|def.*insight\|def.*ai_' /home/ubuntu/bot.py | head -80
          echo
          echo "=== grep: call_groq / call_gemini call sites in scan ==="
          grep -n -A3 'call_groq\|call_gemini\|smart_call' /home/ubuntu/bot.py | grep -A3 'scan\|report\|stock\|saham' | head -60
          echo
          echo "=== Last 30 lines of bot.log ==="
          tail -30 /home/ubuntu/bot.log
          ENDSSH
