name: Full Test & Trigger Scheduled Tasks

on:
  push:
    branches: [claude/trusting-archimedes-yb9d8l]
    paths:
      - '.github/workflows/test-and-trigger.yml'
      - 'wbagent/trigger_scheduled.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Run full AI backtest
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            wbagent/backtest_ai.py ubuntu@140.245.103.249:/tmp/backtest_ai.py
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 \
            "bash --login -c 'python3 /tmp/backtest_ai.py'"

      - name: Inspect bot scheduled function signatures
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 \
            "grep -n 'async def scheduled_\|TELEGRAM_\|BOT_TOKEN\|CHAT_ID\|chat_id' /home/ubuntu/bot.py | head -40"

      - name: Copy and run trigger script
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            wbagent/trigger_scheduled.py ubuntu@140.245.103.249:/tmp/trigger_scheduled.py
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 \
            "bash --login -c 'python3 /tmp/trigger_scheduled.py'"
