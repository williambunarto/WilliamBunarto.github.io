name: Deploy BTC Signal to WBAgent

on:
  push:
    branches: [main]
    paths:
      - 'wbagent/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Create directories on server
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "mkdir -p /home/ubuntu/wbagent/logs"

      - name: Copy signal module files
        run: |
          KEY=/tmp/deploy_key
          OPTS="-i $KEY -o StrictHostKeyChecking=no"
          HOST="ubuntu@williambunarto.duckdns.org"
          scp $OPTS wbagent/btc_signal.py          $HOST:/home/ubuntu/btc_signal.py
          scp $OPTS wbagent/btc_signal_handlers.py $HOST:/home/ubuntu/btc_signal_handlers.py
          echo "Files copied"

      - name: Install Python dependencies
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "pip3 install --user --quiet requests python-dotenv 2>&1 | tail -3 || true"

      - name: Show bot.py status and repair if broken
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            'python3 - << PYEOF
import subprocess, os, shutil

BOT = "/home/ubuntu/bot.py"
BAK = BOT + ".pre_btc_signal.bak"
MARKER = "# BTC_SIGNAL_INJECTED"

# Check current bot.py for syntax errors
result = subprocess.run(["python3", "-m", "py_compile", BOT], capture_output=True, text=True)
if result.returncode != 0:
    print("SYNTAX ERROR in bot.py:")
    print(result.stderr)
    # Restore from backup if available
    if os.path.exists(BAK):
        print(f"Restoring from {BAK}...")
        shutil.copy(BAK, BOT)
        result2 = subprocess.run(["python3", "-m", "py_compile", BOT], capture_output=True, text=True)
        if result2.returncode == 0:
            print("Backup restored successfully — syntax OK")
        else:
            print(f"Backup also broken: {result2.stderr}")
    else:
        print("No backup found — cannot auto-restore")
else:
    print("bot.py syntax OK")
    if MARKER in open(BOT).read():
        print("bot.py already patched")
    else:
        print("bot.py NOT yet patched")
PYEOF'

      - name: Patch bot.py (idempotent)
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            'python3 - << PYEOF
import os, shutil, subprocess

BOT = "/home/ubuntu/bot.py"
BAK = BOT + ".pre_btc_signal.bak"
MARKER = "# BTC_SIGNAL_INJECTED"

if not os.path.exists(BOT):
    print(f"WARN: {BOT} not found")
    raise SystemExit(0)

with open(BOT) as f:
    content = f.read()

if MARKER in content:
    print("Already patched")
    raise SystemExit(0)

# Backup before touching
shutil.copy(BOT, BAK)
print(f"Backed up to {BAK}")

# Find last top-level import line
lines = content.split("\n")
last_import = 0
for i, line in enumerate(lines):
    s = line.strip()
    if (s.startswith("import ") or s.startswith("from ")) and not line.startswith(" ") and not line.startswith("\t"):
        last_import = i

print(f"Last top-level import at line {last_import}: {lines[last_import]!r}")

import_block = "\n" + MARKER + "\ntry:\n    from btc_signal_handlers import register_btc_handlers as _register_btc\n    _BTC_SIGNAL_OK = True\nexcept Exception as _btc_e:\n    print(f\"[WARN] btc_signal_handlers not loaded: {_btc_e}\")\n    _BTC_SIGNAL_OK = False\n"

new_lines = lines[:last_import + 1] + import_block.split("\n") + lines[last_import + 1:]
content = "\n".join(new_lines)

# Find run_polling injection point — look for the actual call line
injected = False
for var in ("application", "app", "updater"):
    pattern = var + ".run_polling"
    if pattern in content:
        # Find the line containing pattern and insert BEFORE that line
        new_content_lines = content.split("\n")
        for idx, ln in enumerate(new_content_lines):
            if pattern in ln:
                indent = len(ln) - len(ln.lstrip())
                pad = " " * indent
                inject_lines = [
                    pad + "# BTC signal handlers",
                    pad + "if _BTC_SIGNAL_OK:",
                    pad + "    _register_btc(" + var + ")",
                    "",
                ]
                new_content_lines = new_content_lines[:idx] + inject_lines + new_content_lines[idx:]
                content = "\n".join(new_content_lines)
                injected = True
                print(f"Injected before line {idx}: {ln.strip()!r}")
                break
        if injected:
            break

if not injected:
    print("Could not find run_polling — appending at end")
    content += "\n# BTC signal handlers\nif _BTC_SIGNAL_OK:\n    _register_btc(application)\n"

# Verify syntax before writing
import tempfile
with tempfile.NamedTemporaryFile(mode="w", suffix=".py", delete=False) as tmp:
    tmp.write(content)
    tmpname = tmp.name

result = subprocess.run(["python3", "-m", "py_compile", tmpname], capture_output=True, text=True)
os.unlink(tmpname)

if result.returncode != 0:
    print(f"PATCH WOULD CREATE SYNTAX ERROR: {result.stderr}")
    print("Aborting patch to protect bot.py")
    raise SystemExit(1)

with open(BOT, "w") as f:
    f.write(content)
print("bot.py patched and syntax verified")
PYEOF'

      - name: Verify imports
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "cd /home/ubuntu && \
             python3 -c 'import btc_signal; print(\"btc_signal import OK\")' && \
             python3 -c 'import btc_signal_handlers; print(\"btc_signal_handlers import OK\")'"  

      - name: Run standalone test scan
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "cd /home/ubuntu && timeout 60 python3 btc_signal.py --test 2>&1 | head -50"

      - name: Write restart script to server
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "printf '%s\n' \
              '#!/bin/bash' \
              'pkill -f python3.*bot.py 2>/dev/null; true' \
              'sleep 2' \
              'cd /home/ubuntu' \
              'nohup python3 bot.py >> /home/ubuntu/bot.log 2>&1 &' \
              'sleep 5' \
              'pgrep -a -f python3 > /tmp/bot_newpid.txt 2>&1 || echo none > /tmp/bot_newpid.txt' \
              > /tmp/restart_bot.sh && chmod +x /tmp/restart_bot.sh"

      - name: Restart bot process (detached via setsid)
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "setsid bash /tmp/restart_bot.sh > /tmp/restart_bot.log 2>&1 < /dev/null & echo Restart initiated in background"

      - name: Verify bot restarted
        run: |
          sleep 15
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "echo '=== All python3 processes ===' && \
             (pgrep -a -f python3 || echo 'none found'); \
             echo '=== bot.log (last 30 lines) ===' && \
             (tail -30 /home/ubuntu/bot.log 2>/dev/null || echo 'no bot.log yet'); \
             echo '=== restart script log ===' && \
             (cat /tmp/restart_bot.log 2>/dev/null || echo 'no restart log')"

      - name: Verify signal logs
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org \
            "echo '=== btc_signal log (last 10 lines) ===' && \
             (tail -10 /home/ubuntu/wbagent/logs/btc_signal.log 2>/dev/null || echo 'no log yet')"
