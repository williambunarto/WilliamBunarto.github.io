name: Fix Gemini SDK Migration

on:
  push:
    branches: [claude/trusting-archimedes-yb9d8l]
    paths:
      - 'wbagent/patch_fix_gemini_sdk.py'
      - 'wbagent/patch_fix_env_loading.py'
      - 'wbagent/backtest_ai.py'
      - '.github/workflows/fix-gemini-sdk.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Find API keys and fix startup
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            wbagent/patch_fix_gemini_sdk.py \
            wbagent/patch_fix_env_loading.py \
            wbagent/backtest_ai.py \
            ubuntu@140.245.103.249:/tmp/

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 << 'ENDSSH'
          echo "=== Where are the API keys? ==="
          echo "--- printenv (login session) ---"
          printenv | grep -E 'GROQ|GEMINI|TELEGRAM|BOT' | sed 's/=.*/=****/' || echo none

          echo
          echo "--- ~/.bashrc ---"
          grep -E 'GROQ|GEMINI|export' /home/ubuntu/.bashrc 2>/dev/null | head -20 | sed 's/=.*/=****/' || echo none

          echo
          echo "--- ~/.profile ---"
          grep -E 'GROQ|GEMINI|export' /home/ubuntu/.profile 2>/dev/null | head -10 | sed 's/=.*/=****/' || echo none

          echo
          echo "--- /etc/environment ---"
          grep -E 'GROQ|GEMINI' /etc/environment 2>/dev/null | sed 's/=.*/=****/' || echo none

          echo
          echo "=== Apply Gemini SDK patch (idempotent) ==="
          python3 /tmp/patch_fix_gemini_sdk.py

          echo
          echo "=== Fix load_dotenv in bot.py ==="
          python3 /tmp/patch_fix_env_loading.py

          echo
          echo "=== Stop existing bot instances ==="
          pkill -f 'while true; do' || true
          sleep 1
          pkill -f 'python3.*bot.py' || true
          sleep 3
          pgrep -af 'bot.py' || echo "(none running)"

          echo
          echo "=== Restart bot using bash --login (inherits .bashrc env) ==="
          nohup bash --login -c '
            while true; do
              python3 /home/ubuntu/bot.py >> /home/ubuntu/bot.log 2>&1
              echo "[restart] bot exited, restarting in 5s..." >> /home/ubuntu/bot.log
              sleep 5
            done
          ' > /dev/null 2>&1 &
          sleep 7

          echo "=== Bot status ==="
          pgrep -af 'bot.py' || echo "(none)"
          pgrep -f 'python3 /home/ubuntu/bot.py' && echo 'BOT: RUNNING' || echo 'BOT: NOT RUNNING'

          echo
          echo "=== Run backtest with --login env ==="
          bash --login -c 'python3 /tmp/backtest_ai.py'
          BACKTEST_EXIT=$?

          echo
          echo "=== Last 20 lines bot.log ==="
          tail -20 /home/ubuntu/bot.log

          if [ "$BACKTEST_EXIT" != "0" ]; then
            echo "WARNING: Backtest failed - API keys may not be accessible"
            exit 1
          fi
          ENDSSH
