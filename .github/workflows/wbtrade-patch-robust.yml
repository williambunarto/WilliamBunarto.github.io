name: WBTrade Patch Robust
on:
  push:
    paths:
      - '.github/scripts/wbtrade/patch_trades_robust.py'
      - '.github/scripts/wbtrade/verify_api.py'
      - '.github/workflows/wbtrade-patch-robust.yml'
      - 'wbtrade/.patch-robust-trigger'
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key
      - name: Patch and restart
        run: |
          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=no"
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org"
          $SCP .github/scripts/wbtrade/patch_trades_robust.py ubuntu@williambunarto.duckdns.org:/tmp/
          $SCP .github/scripts/wbtrade/verify_api.py ubuntu@williambunarto.duckdns.org:/tmp/
          $SSH python3 /tmp/patch_trades_robust.py
          $SSH sudo systemctl restart wbtrade
          sleep 5
          $SSH python3 /tmp/verify_api.py
