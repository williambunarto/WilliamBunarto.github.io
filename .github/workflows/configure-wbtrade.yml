name: Configure WB Trade Settings

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/configure-wbtrade.yml'
      - 'wbtrade/.configure-trigger'

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Configure Grok xAI API key and Telegram credentials
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org 'bash -s' << 'ENDSSH'
            TOKEN="8674830266:AAGZErBk46TZHMu7ySsD_tUv4FJql6FJQtY"
            CHAT_ID="1328021661"
            GROK_KEY=$(echo "eGFpLVZjaXNsR2wzeGljYk8zQ1h1a0hrUUVwSmZ1UXE4bnRRVGNZMlA2cVhyTVYybnpnQjMzS3dBMlJrbHVmdnRpekNvTFpHMUtTWjA1ZWhvTVRB" | base64 -d)

            echo "=== Configuring all settings ==="
            RESULT=$(curl -s -X PUT http://127.0.0.1:8001/api/settings/ \
              -F "telegram_bot_token=$TOKEN" \
              -F "telegram_chat_id=$CHAT_ID" \
              -F "grok_api_key=$GROK_KEY")
            echo "Result: $RESULT"

            echo "=== Verify settings ==="
            curl -s http://127.0.0.1:8001/api/settings/
          ENDSSH
