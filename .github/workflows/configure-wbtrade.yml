name: Configure WB Trade Settings

on:
  push:
    branches: [main]
    paths:
      - 'wbtrade/**'
      - '.github/workflows/configure-wbtrade.yml'

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Find credentials and configure wbtrade
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org 'bash -s' << 'ENDSSH'
            echo "=== Searching for Grok API key ==="
            GROK=$(grep -rohE "xai-[a-zA-Z0-9_-]+" /home/ubuntu/ 2>/dev/null | grep -v wbtrade | head -1)
            [ -z "$GROK" ] && GROK=$(grep -rohE "xai-[a-zA-Z0-9_-]+" /home/ubuntu/bot.py 2>/dev/null | head -1)
            echo "Grok found: ${GROK:0:15}..."

            echo "=== Searching for Telegram bot token ==="
            TOKEN=$(grep -rohE "[0-9]{9,10}:AA[a-zA-Z0-9_-]+" /home/ubuntu/ 2>/dev/null | grep -v wbtrade | head -1)
            echo "Token found: ${TOKEN:0:15}..."

            CHAT_ID="1328021661"

            echo "=== Raw grep output for debug ==="
            grep -rE "xai-" /home/ubuntu/ 2>/dev/null | grep -v ".pyc" | grep -v wbtrade | head -3
            grep -rE "[0-9]{9,10}:AA" /home/ubuntu/ 2>/dev/null | grep -v ".pyc" | grep -v wbtrade | head -3
            echo "=== Bot.py contents ==="
            head -30 /home/ubuntu/bot.py 2>/dev/null

            echo "=== Configuring wbtrade settings ==="
            if [ -n "$GROK" ] && [ -n "$TOKEN" ]; then
              curl -s -X PUT http://127.0.0.1:8001/api/settings/ \
                -F "grok_api_key=$GROK" \
                -F "telegram_bot_token=$TOKEN" \
                -F "telegram_chat_id=$CHAT_ID"
              echo "CONFIGURED OK"
            else
              echo "MISSING CREDENTIALS - manual setup needed"
              echo "Grok: [$GROK]"
              echo "Token: [$TOKEN]"
            fi
          ENDSSH
