name: Deploy /billpay command

on:
  push:
    branches: [main]
    paths:
      - 'bot/billpay.py'
      - '.github/workflows/deploy-billpay.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          echo "" | base64 -d > /tmp/k && chmod 600 /tmp/k

      - name: Deploy billpay.py
        run: |
          ssh -i /tmp/k -o StrictHostKeyChecking=no ubuntu@140.245.103.249 \
            "curl -fsSL 'https://raw.githubusercontent.com/williambunarto/WilliamBunarto.github.io/main/bot/billpay.py' -o /home/ubuntu/billpay.py && echo 'billpay.py downloaded'"

      - name: Test sheet connection
        run: |
          ssh -i /tmp/k -o StrictHostKeyChecking=no ubuntu@140.245.103.249 python3 - << 'PYEOF'
          import sys
          sys.path.insert(0, '/home/ubuntu')
          from billpay import _gc, _tab, _master_names, SHEET_ID
          
          print('=== Connecting to Google Sheets ===')
          gc = _gc()
          sp = gc.open_by_key(SHEET_ID)
          
          print('=== Sheet tabs ===')
          for ws in sp.worksheets():
              print(f'  - {ws.title}')
          
          tab = _tab()
          print(f'\n=== Looking for tab: {tab} ===')
          try:
              ws = sp.worksheet(tab)
              rows = ws.get_all_values()
              print(f'Total rows in tab: {len(rows)}')
              print('First 20 rows (cols A-H):')
              for i, row in enumerate(rows[:20]):
                  print(f'  Row {i+1}: {row[:8]}')
          except Exception as e:
              print(f'ERROR opening tab: {e}')
              sys.exit(1)
          
          print('\n=== MASTER DATA names ===')
          names = _master_names(sp)
          print(', '.join(names[:30]) or '(none found)')
          
          print('\n=== TEST PASSED ===')
          PYEOF

      - name: Patch bot.py
        run: |
          ssh -i /tmp/k -o StrictHostKeyChecking=no ubuntu@140.245.103.249 python3 - << 'PYEOF'
          import sys, re
          
          with open('/home/ubuntu/bot.py', 'r') as f:
              content = f.read()
          
          if 'from billpay import cmd_billpay' in content:
              print('Already patched — no changes needed')
              sys.exit(0)
          
          # 1. Add import before # BTC_SIGNAL_INJECTED
          if '# BTC_SIGNAL_INJECTED' in content:
              content = content.replace(
                  '# BTC_SIGNAL_INJECTED',
                  'from billpay import cmd_billpay\n# BTC_SIGNAL_INJECTED'
              )
              print('Import added before # BTC_SIGNAL_INJECTED')
          else:
              last = max((m.end() for m in re.finditer(r'^(?:import|from)\s+\S', content, re.MULTILINE)), default=0)
              content = content[:last] + '\nfrom billpay import cmd_billpay' + content[last:]
              print('Import added (fallback: after last import line)')
          
          # 2. Add handler before app.run_polling
          POLL = '    app.run_polling(allowed_updates=Update.ALL_TYPES)'
          if POLL in content:
              content = content.replace(
                  POLL,
                  '    app.add_handler(CommandHandler("billpay", cmd_billpay))\n' + POLL
              )
              print('Handler added before app.run_polling')
          else:
              print('WARNING: app.run_polling not found — add handler manually')
          
          with open('/home/ubuntu/bot.py', 'w') as f:
              f.write(content)
          print('bot.py patched successfully')
          PYEOF

      - name: Restart bot
        run: |
          ssh -i /tmp/k -o StrictHostKeyChecking=no ubuntu@140.245.103.249 bash << 'BASHEOF'
          echo "Stopping bot..."
          pkill -f "python3.*bot.py" || pkill -f "python3 bot.py" || true
          sleep 3
          echo "Starting bot..."
          cd /home/ubuntu
          nohup python3 bot.py >> nohup.out 2>&1 &
          sleep 5
          if pgrep -f "python3.*bot.py" > /dev/null; then
              echo "Bot restarted successfully (PID: $(pgrep -f 'python3.*bot.py'))"
          else
              echo "ERROR: Bot did not start — check /home/ubuntu/nohup.out"
              tail -20 /home/ubuntu/nohup.out
              exit 1
          fi
          BASHEOF

      - name: Cleanup explore workflow
        run: |
          ssh -i /tmp/k -o StrictHostKeyChecking=no ubuntu@140.245.103.249 \
            "rm -f /tmp/test_billpay.py"
