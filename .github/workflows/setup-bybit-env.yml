name: Setup Bybit .env on Server

on:
  push:
    branches:
      - 'claude/bybit-api-credentials-657y75'
    paths:
      - '.github/workflows/setup-bybit-env.yml'

jobs:
  setup-env:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Setup .env on server
        run: |
          KEY=/tmp/deploy_key
          HOST=williambunarto.duckdns.org
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=10 -o BatchMode=yes"

          ssh $SSH_OPTS -i $KEY ubuntu@$HOST bash << 'ENDSSH'
          echo "=== Step 1: Check current .env ==="
          if [ -f /home/ubuntu/.env ]; then
            echo "File exists:"
            cat /home/ubuntu/.env
          else
            echo "(file does not exist)"
          fi

          echo ""
          echo "=== Step 2: Add Bybit credentials ==="
          if [ -f /home/ubuntu/.env ]; then
            grep -v "^BYBIT_API_KEY=" /home/ubuntu/.env | grep -v "^BYBIT_API_SECRET=" > /tmp/.env.tmp
            mv /tmp/.env.tmp /home/ubuntu/.env
          fi
          printf 'BYBIT_API_KEY=cz6SnYahLFhvwONGe3\nBYBIT_API_SECRET=EMEmWNIjpZ339mipKaiNhCWGeO1MCdoJpXyW\n' >> /home/ubuntu/.env

          echo ""
          echo "=== Step 3: Set permissions ==="
          chmod 600 /home/ubuntu/.env
          echo "Done."

          echo ""
          echo "=== Step 4: Confirm contents ==="
          cat /home/ubuntu/.env

          echo ""
          echo "=== Step 5: Confirm permissions ==="
          ls -la /home/ubuntu/.env
          ENDSSH
