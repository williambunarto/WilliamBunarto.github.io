name: WBTrade - Bybit Import Feature + Load Historical Data

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/wbtrade-bybit-import.yml'
      - '.github/scripts/wbtrade/**'
      - 'wbtrade/.bybit-import-trigger'

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to server
        run: |
          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=no"
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org"

          $SCP .github/scripts/wbtrade/migrate.py \
               .github/scripts/wbtrade/patch_trades.py \
               .github/scripts/wbtrade/patch_html.py \
               .github/scripts/wbtrade/insert_trades.py \
               .github/scripts/wbtrade/verify.py \
               ubuntu@williambunarto.duckdns.org:/tmp/

          echo '=== Backup DB ==='
          $SSH "cp /home/ubuntu/wbtrade/data/trade.db /home/ubuntu/wbtrade/data/trade.db.bak.\$(date +%Y%m%d_%H%M%S)"

          echo '=== Migrate DB + patch database.py ==='
          $SSH python3 /tmp/migrate.py

          echo '=== Patch trades router ==='
          $SSH python3 /tmp/patch_trades.py

          echo '=== Patch frontend ==='
          $SSH python3 /tmp/patch_html.py

          echo '=== Insert historical trades ==='
          $SSH python3 /tmp/insert_trades.py

          echo '=== Restart service ==='
          $SSH sudo systemctl restart wbtrade
          sleep 5
          echo "Service: $($SSH sudo systemctl is-active wbtrade)"

          echo '=== Verify ==='
          $SSH python3 /tmp/verify.py

          echo '=== API check ==='
          $SSH "curl -s -o /dev/null -w 'GET /api/trades/ -> HTTP %{http_code}\n' http://127.0.0.1:8001/api/trades/"
          $SSH "curl -s http://127.0.0.1:8001/api/trades/?limit=1 | python3 -c 'import sys,json; d=json.load(sys.stdin); print(\"First trade:\", d[0][\"market\"] if d else \"empty\")'"
