name: Deploy GSheets Creds (one-time)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Write creds file to server
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 "mkdir -p ~/wbagent"
          echo "" | base64 -d | ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@140.245.103.249 "cat > ~/wbagent/gsheets-creds.json"
          echo "Deployed: $?"
