name: Update bot.py Model Config

on:
  push:
    paths:
      - '.github/workflows/update-botpy-models.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Update Groq MODELS list in bot.py
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org << 'EOF'
          set -e
          echo "=== Backing up ==="
          cp /home/ubuntu/bot.py /home/ubuntu/bot.py.pre_model_update.bak

          echo "=== Patching ==="
          sed -i 's/"mixtral-8x7b-32768",/"llama-3.1-8b-instant",/' /home/ubuntu/bot.py
          sed -i '/"gemma2-9b-it",/d' /home/ubuntu/bot.py

          echo "=== Verify ==="
          grep -A4 'MODELS = ' /home/ubuntu/bot.py | head -6

          echo "=== Syntax check ==="
          python3 -m py_compile /home/ubuntu/bot.py && echo 'Syntax OK'

          echo "=== Restart bot ==="
          pkill -f 'python3 /home/ubuntu/bot.py' || true
          sleep 1
          nohup python3 /home/ubuntu/bot.py >> /home/ubuntu/bot.log 2>&1 &
          sleep 3
          pgrep -f 'python3 /home/ubuntu/bot.py' && echo 'Bot running OK' || echo 'ERROR: bot not running'
          EOF
