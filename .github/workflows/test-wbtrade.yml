name: Test WB Trade Dashboard

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-wbtrade.yml'
      - 'wbtrade/.test-trigger'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Run integration tests
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org 'bash -s' << 'ENDSSH'
            BASE="http://127.0.0.1:8001"
            PASS=0
            FAIL=0

            check() {
              local name="$1" expected="$2" actual="$3"
              if echo "$actual" | grep -qF "$expected"; then
                echo "  PASS: $name"
                PASS=$((PASS+1))
              else
                echo "  FAIL: $name"
                echo "    Expected to contain: $expected"
                echo "    Got: ${actual:0:300}"
                FAIL=$((FAIL+1))
              fi
            }

            check_status() {
              local name="$1" expected="$2" actual="$3"
              if [ "$actual" = "$expected" ]; then
                echo "  PASS: $name (HTTP $actual)"
                PASS=$((PASS+1))
              else
                echo "  FAIL: $name (expected $expected, got $actual)"
                FAIL=$((FAIL+1))
              fi
            }

            # ── SERVICE HEALTH ──────────────────────────────────────────────
            echo "=== SERVICE HEALTH ==="
            STATUS=$(sudo systemctl is-active wbtrade)
            [ "$STATUS" = "active" ] \
              && { echo "  PASS: wbtrade service is active"; PASS=$((PASS+1)); } \
              || { echo "  FAIL: wbtrade service status = $STATUS"; FAIL=$((FAIL+1)); }

            # ── HTTP STATUS ─────────────────────────────────────────────────
            echo ""
            echo "=== HTTP STATUS TESTS ==="
            check_status "GET /"                    200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/)
            check_status "GET /settings"            200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/settings)
            check_status "GET /docs"                200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/docs)
            check_status "GET /openapi.json"        200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/openapi.json)
            check_status "GET /api/settings/"       200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/settings/)
            check_status "GET /api/trades/"         200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/trades/)
            check_status "GET /api/stats/summary"   200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/stats/summary)
            check_status "GET /api/stats/equity-curve"  200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/stats/equity-curve)
            check_status "GET /api/stats/monthly-pnl"   200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/stats/monthly-pnl)
            check_status "GET /api/stats/by-setup"      200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/stats/by-setup)
            check_status "GET /api/stats/by-psychology" 200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/stats/by-psychology)
            check_status "GET /api/market/state"    200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/market/state)
            check_status "GET /api/market/history"  200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/market/history)
            check_status "GET /api/journal/daily"   200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/journal/daily)
            check_status "GET /api/journal/monthly" 200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/journal/monthly)
            check_status "GET /api/plans/"          200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/plans/)
            check_status "GET /api/playbook/"       200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/playbook/)
            check_status "GET /api/spot/entries"    200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/spot/entries)
            check_status "GET /api/spot/targets"    200 $(curl -s -o /dev/null -w "%{http_code}" $BASE/api/spot/targets)

            # ── CONTENT TESTS ────────────────────────────────────────────────
            echo ""
            echo "=== CONTENT TESTS ==="
            SETTINGS=$(curl -s $BASE/api/settings/)
            check "Settings has telegram_chat_id"      "telegram_chat_id" "$SETTINGS"
            check "Settings has grok_api_key"           "grok_api_key"     "$SETTINGS"
            check "Settings has account_balance"        "account_balance"  "$SETTINGS"
            check "Telegram chat ID 1328021661 set"     "1328021661"       "$SETTINGS"

            SUMMARY=$(curl -s $BASE/api/stats/summary)
            check "Stats summary returns JSON"          "{"                "$SUMMARY"

            TRADES=$(curl -s $BASE/api/trades/)
            check "Trades returns array"                "["                "$TRADES"

            OPENAPI=$(curl -s $BASE/openapi.json)
            check "OpenAPI lists trades route"          "/api/trades/"     "$OPENAPI"
            check "OpenAPI lists settings route"        "/api/settings/"   "$OPENAPI"
            check "OpenAPI lists stats routes"          "/api/stats/"      "$OPENAPI"
            check "OpenAPI lists market routes"         "/api/market/"     "$OPENAPI"
            check "OpenAPI lists journal routes"        "/api/journal/"    "$OPENAPI"

            HOME_HTML=$(curl -s $BASE/)
            check "Home page returns HTML"              "<html"            "$HOME_HTML"

            # ── WRITE TESTS ──────────────────────────────────────────────────
            echo ""
            echo "=== WRITE TESTS ==="
            CREATE=$(curl -s -X POST $BASE/api/trades/ \
              -H "Content-Type: application/json" \
              -d '{"date":"2026-06-18","direction":"LONG","entry":65000,"stop":64000,"notes":"ci-test"}')
            if echo "$CREATE" | grep -qE '"id"|"detail"|"error"'; then
              echo "  PASS: POST /api/trades/ returns valid JSON"
              PASS=$((PASS+1))
            else
              echo "  FAIL: POST /api/trades/ unexpected: ${CREATE:0:300}"
              FAIL=$((FAIL+1))
            fi

            SET=$(curl -s -X PUT $BASE/api/settings/ \
              -F "telegram_chat_id=1328021661" \
              -F "account_balance=1000" \
              -F "risk_percent=5")
            check "PUT /api/settings/ returns ok" "ok" "$SET"

            # ── NGINX PROXY ──────────────────────────────────────────────────
            echo ""
            echo "=== NGINX PROXY TESTS ==="
            check_status "nginx /trade/ proxies (200)"       200 $(curl -s -o /dev/null -w "%{http_code}" http://localhost/trade/)
            check_status "nginx /trade redirects (301)"      301 $(curl -s -o /dev/null -w "%{http_code}" http://localhost/trade)

            # ── DATABASE ─────────────────────────────────────────────────────
            echo ""
            echo "=== DATABASE TEST ==="
            DB_SIZE=$(du -sh /home/ubuntu/wbtrade/data/trade.db 2>/dev/null | cut -f1)
            if [ -n "$DB_SIZE" ]; then
              echo "  PASS: SQLite DB exists at data/trade.db (size: $DB_SIZE)"
              PASS=$((PASS+1))
            else
              echo "  FAIL: SQLite DB not found at data/trade.db"
              FAIL=$((FAIL+1))
            fi

            # ── SUMMARY ──────────────────────────────────────────────────────
            echo ""
            echo "================================================"
            echo "  RESULTS: $PASS passed, $FAIL failed"
            echo "================================================"
            [ $FAIL -eq 0 ] || exit 1
          ENDSSH
