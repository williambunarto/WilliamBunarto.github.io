name: Test WB Trade Dashboard

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-wbtrade.yml'
      - 'wbtrade/.test-trigger'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          cp "ssh-key-2026-03-30 (1).key" /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Discover paths
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@williambunarto.duckdns.org 'bash -s' << 'ENDSSH'
            echo "=== DB files in wbtrade dir ==="
            find /home/ubuntu/wbtrade -name "*.db" -o -name "*.sqlite" -o -name "*.sqlite3" 2>/dev/null

            echo ""
            echo "=== All API routes from OpenAPI ==="
            curl -s http://127.0.0.1:8001/openapi.json | python3 -c "import sys,json; d=json.load(sys.stdin); [print(p) for p in sorted(d['paths'].keys())]"

            echo ""
            echo "=== wbtrade directory listing ==="
            ls -la /home/ubuntu/wbtrade/
          ENDSSH
